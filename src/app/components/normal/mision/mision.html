<!-- MisionComponent (C-22) -->
<section class="mision-section section-padding">
  <div class="container">
    <div class="row align-items-center g-5">

      <!-- TEXTO -->
      <div class="col-lg-6 col-12 mision-texto">
        <!-- Badge -->
        <div class="badge-mision mb-3">
          <span>Nuestra Misión</span>
        </div>

        <!-- Título -->
        <h1> Nuestra Pasión<br>por los Perros</h1>

        <!-- Descripción -->
        <p class="mision-desc espacio-md">
          Dedicamos nuestra vida a conectar familias con cachorros
          saludables, criados en un entorno de amor, ética y
          profesionalismo médico.
        </p>

        <!-- Stats decorativos -->
        <div class="mision-stats d-flex gap-4 flex-wrap">
          <div class="stat-item">
            <span class="stat-number font-dosis">5,000+</span>
            <span class="stat-label">Familias felices</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-number font-dosis">10+</span>
            <span class="stat-label">Años de experiencia</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-number font-dosis">100%</span>
            <span class="stat-label">Ética profesional</span>
          </div>
        </div>
      </div>

      <!-- IMAGEN -->
      <div class="col-lg-6 col-12 mision-img-wrapper">
        <div class="mision-img-container">
          <img
            src="img/veterinaria.jpg"
            alt="Clínica veterinaria The Puppies Home"
            class="mision-img"
          />
          <!-- Badge flotante -->
          <div class="mision-badge-flotante">
            <i class="bi bi-shield-check fs-1"></i>
            <div>
              <strong>Certificados</strong>
              <span>Excelencia Ética</span>
            </div>
          </div>
        </div>
        <!-- Pata decorativa -->
        <div class="paw-bg-deco" aria-hidden="true">
          <i class="bi bi-paw-fill fs-1"></i>
        </div>
      </div>

    </div>
  </div>
</section>
